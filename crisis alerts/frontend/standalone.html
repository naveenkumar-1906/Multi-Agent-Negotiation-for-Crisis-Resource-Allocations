<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crisis Resource Allocation - Standalone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .controls h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .disaster-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #ff9800; color: white; }
        .btn-reset { background: #2196f3; color: white; }
        .btn-disaster { background: #f44336; color: white; }

        .status {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .status h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .metric {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .metric h4 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: #666;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .agents {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .agents h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .agent {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s ease;
        }

        .agent:hover {
            transform: translateY(-2px);
        }

        .agent.hospital { border-left-color: #f44336; }
        .agent.emergency { border-left-color: #ff9800; }
        .agent.water { border-left-color: #2196f3; }
        .agent.residential { border-left-color: #4caf50; }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .agent-name {
            font-weight: 600;
            color: #333;
        }

        .agent-status {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-critical { background: #ffebee; color: #f44336; }
        .status-failing { background: #fff3e0; color: #ff9800; }
        .status-stable { background: #e8f5e8; color: #4caf50; }

        .priority-badge {
            padding: 6px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            min-width: 40px;
            text-align: center;
        }

        .priority-1 { background: #f44336; }
        .priority-2 { background: #ff9800; }
        .priority-3 { background: #2196f3; }
        .priority-4 { background: #4caf50; }

        .agent-metrics {
            font-size: 0.9rem;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 600;
        }

        .success { background: #e8f5e8; color: #388e3c; }
        .error { background: #ffebee; color: #d32f2f; }
        .info { background: #e3f2fd; color: #1976d2; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Crisis Resource Allocation System</h1>
        </div>

        <div class="controls">
            <h2>Simulation Control</h2>
            <div class="button-group">
                <button class="btn btn-start" onclick="startSimulation()">▶ Start</button>
                <button class="btn btn-stop" onclick="stopSimulation()">⏸ Stop</button>
                <button class="btn btn-reset" onclick="resetSimulation()">↺ Reset</button>
            </div>
            
            <div class="disaster-controls">
                <label>Disaster Type:</label>
                <select id="disasterType">
                    <option value="earthquake">🌋 Earthquake</option>
                    <option value="flood">🌊 Flood</option>
                    <option value="power_failure">⚡ Power Failure</option>
                    <option value="storm">🌪️ Storm</option>
                </select>
                
                <label>Impact Level:</label>
                <select id="impactLevel">
                    <option value="0.3">Medium (0.3)</option>
                    <option value="0.5">High (0.5)</option>
                    <option value="0.8">Severe (0.8)</option>
                </select>
                
                <button class="btn btn-disaster" onclick="triggerDisaster()">⚡ Trigger Disaster</button>
            </div>
        </div>

        <div id="messageArea"></div>

        <div class="status">
            <h3>System Status</h3>
            <div class="metrics">
                <div class="metric">
                    <h4>Power Supply</h4>
                    <div class="metric-value" id="totalSupply">0.0</div>
                </div>
                <div class="metric">
                    <h4>Total Demand</h4>
                    <div class="metric-value" id="totalDemand">0.0</div>
                </div>
                <div class="metric">
                    <h4>Allocated</h4>
                    <div class="metric-value" id="totalAllocated">0.0</div>
                </div>
                <div class="metric">
                    <h4>System Stress</h4>
                    <div class="metric-value" id="systemStress">0.0%</div>
                </div>
            </div>
        </div>

        <div class="agents">
            <h3>Agent Status Details</h3>
            <div class="agent-grid" id="agentGrid">
                <div class="loading">Loading agent data...</div>
            </div>
        </div>
    </div>

    <script>
        // Embedded simulation logic to avoid CORS issues
        class CrisisSimulation {
            constructor() {
                this.agents = [
                    { id: "H1", name: "City Hospital H1", type: "hospital", priority: 1, demand: 100, allocated: 50, min_required: 30, status: "failing" },
                    { id: "H2", name: "City Hospital H2", type: "hospital", priority: 1, demand: 120, allocated: 40, min_required: 25, status: "failing" },
                    { id: "E1", name: "Emergency Services E1", type: "emergency_services", priority: 2, demand: 80, allocated: 30, min_required: 20, status: "failing" },
                    { id: "E2", name: "Emergency Services E2", type: "emergency_services", priority: 2, demand: 90, allocated: 25, min_required: 22, status: "failing" },
                    { id: "W1", name: "Water Supply Station W1", type: "water_supply", priority: 3, demand: 60, allocated: 20, min_required: 15, status: "failing" },
                    { id: "W2", name: "Water Supply Station W2", type: "water_supply", priority: 3, demand: 70, allocated: 18, min_required: 18, status: "failing" },
                    { id: "R1", name: "Residential/Commercial Zone R1", type: "residential_commercial", priority: 4, demand: 50, allocated: 10, min_required: 5, status: "failing" },
                    { id: "R2", name: "Residential/Commercial Zone R2", type: "residential_commercial", priority: 4, demand: 55, allocated: 8, min_required: 6, status: "failing" },
                    { id: "R3", name: "Residential/Commercial Zone R3", type: "residential_commercial", priority: 4, demand: 45, allocated: 7, min_required: 4, status: "failing" }
                ];
                
                this.totalSupply = 100.0;
                this.totalDemand = this.agents.reduce((sum, agent) => sum + agent.demand, 0);
                this.totalAllocated = this.agents.reduce((sum, agent) => sum + agent.allocated, 0);
                this.systemStress = 0.8;
                this.isRunning = false;
            }

            startSimulation() {
                this.isRunning = true;
                this.updateDisplay();
                showMessage("Simulation started", "success");
            }

            stopSimulation() {
                this.isRunning = false;
                this.updateDisplay();
                showMessage("Simulation stopped", "success");
            }

            resetSimulation() {
                this.agents.forEach(agent => {
                    agent.demand = agent.demand * 0.8; // Reset to 80% of original
                    agent.allocated = agent.min_required; // Reset to minimum
                    agent.status = "failing";
                });
                this.updateDisplay();
                showMessage("Simulation reset", "success");
            }

            triggerDisaster() {
                const disasterType = document.getElementById('disasterType').value;
                const impact = parseFloat(document.getElementById('impactLevel').value);

                // Apply disaster effects
                if (disasterType === "earthquake") {
                    this.totalSupply *= (1 - impact * 0.4); // 40% supply reduction
                    this.agents.forEach(agent => {
                        if (agent.type === "hospital") {
                            agent.demand *= (1 + impact * 0.5); // 50% increase
                        } else if (agent.type === "emergency_services") {
                            agent.demand *= (1 + impact * 0.3); // 30% increase
                        }
                        agent.status = "critical";
                    });
                    this.systemStress = Math.min(0.95, this.systemStress + impact * 0.2);
                    
                } else if (disasterType === "flood") {
                    this.totalSupply *= (1 - impact * 0.3); // 30% supply reduction
                    this.agents.forEach(agent => {
                        if (agent.type === "water_supply") {
                            agent.demand *= (1 + impact * 0.4); // 40% increase
                        } else if (agent.type === "hospital") {
                            agent.demand *= (1 + impact * 0.2); // 20% increase
                        }
                        agent.status = "critical";
                    });
                    this.systemStress = Math.min(0.90, this.systemStress + impact * 0.15);
                    
                } else if (disasterType === "power_failure") {
                    this.totalSupply *= (1 - impact * 0.5); // 50% supply reduction
                    this.agents.forEach(agent => {
                        agent.demand *= (1 + impact * 0.1); // 10% increase
                        agent.status = "critical";
                    });
                    this.systemStress = Math.min(0.98, this.systemStress + impact * 0.25);
                    
                } else if (disasterType === "storm") {
                    this.totalSupply *= (1 - impact * 0.35); // 35% supply reduction
                    this.agents.forEach(agent => {
                        const stormEffect = 0.8 + Math.random() * 0.4; // Random effect
                        agent.demand *= (1 + impact * stormEffect);
                        agent.status = "critical";
                    });
                    this.systemStress = Math.min(0.92, this.systemStress + impact * 0.18);
                }

                // Reallocate resources based on priority
                this.reallocateResources();
                this.updateDisplay();
                showMessage(`${disasterType.toUpperCase()} disaster triggered with ${impact * 100}% impact`, "success");
            }

            reallocateResources() {
                const totalDemand = this.agents.reduce((sum, agent) => sum + agent.demand, 0);
                
                // Sort by priority (1=highest, 4=lowest)
                const sortedAgents = [...this.agents].sort((a, b) => a.priority - b.priority);
                
                let remainingSupply = this.totalSupply;
                
                // Allocate minimum requirements first
                sortedAgents.forEach(agent => {
                    if (remainingSupply >= agent.min_required) {
                        agent.allocated = agent.min_required;
                        remainingSupply -= agent.min_required;
                        agent.status = agent.allocated >= agent.demand ? "stable" : "failing";
                    } else {
                        agent.allocated = remainingSupply * 0.8; // Allocate 80% of remaining
                        remainingSupply -= agent.allocated;
                        agent.status = "critical";
                    }
                });
                
                // Distribute remaining supply proportionally
                if (remainingSupply > 0) {
                    const remainingAgents = sortedAgents.filter(agent => agent.allocated < agent.demand);
                    const remainingDemand = remainingAgents.reduce((sum, agent) => sum + (agent.demand - agent.allocated), 0);
                    
                    remainingAgents.forEach(agent => {
                        if (remainingDemand > 0 && remainingSupply > 0) {
                            const allocation = Math.min(remainingSupply, agent.demand - agent.allocated);
                            const proportion = allocation / remainingDemand;
                            agent.allocated += allocation * proportion;
                            remainingSupply -= allocation * proportion;
                            remainingDemand -= allocation * proportion;
                        }
                        
                        agent.status = agent.allocated >= agent.demand ? "stable" : 
                                       agent.allocated >= agent.min_required ? "failing" : "critical";
                    });
                }
                
                this.totalAllocated = this.agents.reduce((sum, agent) => sum + agent.allocated, 0);
            }

            updateDisplay() {
                // Update system metrics
                document.getElementById('totalSupply').textContent = this.totalSupply.toFixed(1);
                document.getElementById('totalDemand').textContent = this.totalDemand.toFixed(1);
                document.getElementById('totalAllocated').textContent = this.totalAllocated.toFixed(1);
                document.getElementById('systemStress').textContent = (this.systemStress * 100).toFixed(1) + '%';

                // Update agents
                const agentGrid = document.getElementById('agentGrid');
                agentGrid.innerHTML = '';

                this.agents.forEach(agent => {
                    const agentDiv = document.createElement('div');
                    agentDiv.className = `agent ${agent.type.replace('_', '')}`;
                    
                    const statusClass = agent.status === 'critical' ? 'status-critical' : 
                                       agent.status === 'failing' ? 'status-failing' : 'status-stable';
                    
                    const allocationRatio = agent.demand > 0 ? (agent.allocated / agent.demand) * 100 : 0;
                    
                    agentDiv.innerHTML = `
                        <div class="agent-header">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-status ${statusClass}">${agent.status.toUpperCase()}</div>
                            <div class="priority-badge priority-${agent.priority}">P${agent.priority}</div>
                        </div>
                        <div class="agent-metrics">
                            <div class="metric-row">
                                <span>Priority:</span>
                                <span>P${agent.priority}</span>
                            </div>
                            <div class="metric-row">
                                <span>Demand:</span>
                                <span>${agent.demand.toFixed(1)}</span>
                            </div>
                            <div class="metric-row">
                                <span>Allocated:</span>
                                <span>${agent.allocated.toFixed(1)}</span>
                            </div>
                            <div class="metric-row">
                                <span>Allocation:</span>
                                <span style="color: ${allocationRatio >= 80 ? '#4caf50' : allocationRatio >= 50 ? '#ff9800' : '#f44336'}">
                                    ${allocationRatio.toFixed(1)}%
                                </span>
                            </div>
                        </div>
                    `;
                    
                    agentGrid.appendChild(agentDiv);
                });

                showMessage(`Updated: ${this.agents.length} agents`, 'success');
            }
        }

        function showMessage(message, type = 'info') {
            const messageArea = document.getElementById('messageArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = message;
            messageArea.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        // Initialize simulation
        const simulation = new CrisisSimulation();
        
        // Bind event handlers
        window.startSimulation = () => simulation.startSimulation();
        window.stopSimulation = () => simulation.stopSimulation();
        window.resetSimulation = () => simulation.resetSimulation();
        window.triggerDisaster = () => simulation.triggerDisaster();
        
        // Initial display update
        simulation.updateDisplay();
    </script>
</body>
</html>
