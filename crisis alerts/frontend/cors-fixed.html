<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crisis Resource Allocation - CORS Fixed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .controls h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .disaster-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #ff9800; color: white; }
        .btn-reset { background: #2196f3; color: white; }
        .btn-disaster { background: #f44336; color: white; }

        .status {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .status h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .metric {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .metric h4 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            color: #666;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
        }

        .agents {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .agents h3 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .agent {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .agent.hospital { border-left-color: #f44336; }
        .agent.emergency { border-left-color: #ff9800; }
        .agent.water { border-left-color: #2196f3; }
        .agent.residential { border-left-color: #4caf50; }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .agent-name {
            font-weight: 600;
            color: #333;
        }

        .agent-status {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-critical { background: #ffebee; color: #f44336; }
        .status-failing { background: #fff3e0; color: #ff9800; }
        .status-stable { background: #e8f5e8; color: #4caf50; }

        .agent-metrics {
            font-size: 0.9rem;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-weight: 600;
        }

        .success { background: #e8f5e8; color: #388e3c; }
        .error { background: #ffebee; color: #d32f2f; }
        .info { background: #e3f2fd; color: #1976d2; }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Crisis Resource Allocation System</h1>
        </div>

        <div class="controls">
            <h2>Simulation Control</h2>
            <div class="button-group">
                <button class="btn btn-start" onclick="startSim()">▶ Start</button>
                <button class="btn btn-stop" onclick="stopSim()">⏸ Stop</button>
                <button class="btn btn-reset" onclick="resetSim()">↺ Reset</button>
            </div>
            
            <div class="disaster-controls">
                <label>Disaster:</label>
                <select id="disasterType">
                    <option value="earthquake">🌋 Earthquake</option>
                    <option value="flood">🌊 Flood</option>
                    <option value="power_failure">⚡ Power Failure</option>
                    <option value="storm">🌪️ Storm</option>
                </select>
                
                <label>Impact:</label>
                <select id="impactLevel">
                    <option value="0.3">Medium</option>
                    <option value="0.5">High</option>
                    <option value="0.8">Severe</option>
                </select>
                
                <button class="btn btn-disaster" onclick="triggerDisaster()">⚡ Trigger</button>
            </div>
        </div>

        <div id="messageArea"></div>

        <div class="status">
            <h3>System Status</h3>
            <div class="metrics">
                <div class="metric">
                    <h4>Power Supply</h4>
                    <div class="metric-value" id="supply">0.0</div>
                </div>
                <div class="metric">
                    <h4>Total Demand</h4>
                    <div class="metric-value" id="demand">0.0</div>
                </div>
                <div class="metric">
                    <h4>Allocated</h4>
                    <div class="metric-value" id="allocated">0.0</div>
                </div>
                <div class="metric">
                    <h4>System Stress</h4>
                    <div class="metric-value" id="stress">0.0%</div>
                </div>
            </div>
        </div>

        <div class="agents">
            <h3>Agent Status Details</h3>
            <div class="agent-grid" id="agentGrid">
                <div class="loading">Loading agent data...</div>
            </div>
        </div>
    </div>

    <script>
        let simulationData = null;
        let isRunning = false;

        function showMessage(msg, type = 'info') {
            const messageArea = document.getElementById('messageArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = msg;
            messageArea.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        function updateDisplay() {
            if (!simulationData) return;

            // Update system metrics
            document.getElementById('supply').textContent = simulationData.total_supply.toFixed(1);
            document.getElementById('demand').textContent = simulationData.total_demand.toFixed(1);
            document.getElementById('allocated').textContent = simulationData.total_allocated.toFixed(1);
            document.getElementById('stress').textContent = (simulationData.system_stress * 100).toFixed(1) + '%';

            // Update agents
            const agentGrid = document.getElementById('agentGrid');
            agentGrid.innerHTML = '';

            simulationData.agents.forEach(agent => {
                const agentDiv = document.createElement('div');
                agentDiv.className = `agent ${agent.type.replace('_', '')}`;
                
                const statusClass = agent.status === 'critical' ? 'status-critical' : 
                                   agent.status === 'failing' ? 'status-failing' : 'status-stable';
                
                agentDiv.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-status ${statusClass}">${agent.status.toUpperCase()}</div>
                    </div>
                    <div class="agent-metrics">
                        <div class="metric-row">
                            <span>Priority:</span>
                            <span>P${agent.priority}</span>
                        </div>
                        <div class="metric-row">
                            <span>Demand:</span>
                            <span>${agent.demand.toFixed(1)}</span>
                        </div>
                        <div class="metric-row">
                            <span>Allocated:</span>
                            <span>${agent.allocated.toFixed(1)}</span>
                        </div>
                        <div class="metric-row">
                            <span>Allocation:</span>
                            <span>${((agent.allocated / agent.demand) * 100).toFixed(1)}%</span>
                        </div>
                    </div>
                `;
                
                agentGrid.appendChild(agentDiv);
            });

            showMessage(`Updated: ${simulationData.agents.length} agents`, 'success');
        }

        async function startSim() {
            try {
                showMessage('Starting simulation...', 'info');
                const response = await fetch('http://localhost:8000/api/simulation/start', {
                    method: 'POST',
                    mode: 'cors'
                });
                const result = await response.json();
                isRunning = true;
                showMessage(result.message, 'success');
                setTimeout(loadData, 1000);
            } catch (error) {
                showMessage('Error starting simulation: ' + error.message, 'error');
            }
        }

        async function stopSim() {
            try {
                const response = await fetch('http://localhost:8000/api/simulation/stop', {
                    method: 'POST',
                    mode: 'cors'
                });
                const result = await response.json();
                isRunning = false;
                showMessage(result.message, 'success');
            } catch (error) {
                showMessage('Error stopping simulation: ' + error.message, 'error');
            }
        }

        async function resetSim() {
            try {
                showMessage('Resetting simulation...', 'info');
                const response = await fetch('http://localhost:8000/api/simulation/reset', {
                    method: 'POST',
                    mode: 'cors'
                });
                const result = await response.json();
                isRunning = false;
                showMessage(result.message, 'success');
                setTimeout(loadData, 1000);
            } catch (error) {
                showMessage('Error resetting simulation: ' + error.message, 'error');
            }
        }

        async function triggerDisaster() {
            const disasterType = document.getElementById('disasterType').value;
            const impact = parseFloat(document.getElementById('impactLevel').value);

            try {
                showMessage(`Triggering ${disasterType} disaster...`, 'info');
                const response = await fetch('http://localhost:8000/api/disaster/trigger', {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ type: disasterType, impact })
                });
                const result = await response.json();
                showMessage(result.message, 'success');
                setTimeout(loadData, 1000);
            } catch (error) {
                showMessage('Error triggering disaster: ' + error.message, 'error');
            }
        }

        async function loadData() {
            try {
                const response = await fetch('http://localhost:8000/api/status', {
                    mode: 'cors'
                });
                const data = await response.json();
                simulationData = data;
                updateDisplay();
                console.log('Data loaded:', data);
            } catch (error) {
                showMessage('Error loading data: ' + error.message, 'error');
                console.error('Error:', error);
            }
        }

        // Initialize
        loadData();
        
        // Auto-refresh every 2 seconds
        setInterval(loadData, 2000);
    </script>
</body>
</html>
